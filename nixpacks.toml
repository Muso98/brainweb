# nixpacks.toml
# Railway build boshida Ubuntu tizim paketlarini o'rnatadi

[phases.setup]
# dcm2niix: DICOM -> NIfTI konvertatsiya qilish uchun (ai.py da ishlatiladi)
# libgl1, libglib2.0-0: OpenCV ishlatish uchun kerak
aptPkgs = [
    "dcm2niix",
    "libgl1",
    "libglib2.0-0",
    "libsm6",
    "libxrender1",
    "libxext6",
]

[phases.install]
cmds = [
    "python -m pip install --upgrade pip",
    "python -m pip install -r requirements-railway.txt"
]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[start]
cmd = "gunicorn brainweb.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
